<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>실시간 전북(전주) 날씨 조회- 1203 이채빈</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#74ebd5,#ACB6E5);
            font-family:Arial,sans-serif;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:25px;
            width:350px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:30px;
            font-size:35px;
        }

        .weather{
            font-size:24px;
            line-height:2;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>☁️ 실시간 전북(전주) 날씨 - 1203 이채빈 </h1>

    <div class="weather">

        <p>🌡️ 기온: {{ temperature }} °C</p>

        <p>💧 습도: {{ humidity }} %</p>

        <p>😊 좋은 하루 보내세요!</p>

    </div>

</div>

</body>
</html>
