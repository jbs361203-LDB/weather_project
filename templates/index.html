<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 날씨</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(90deg,#6fe7cf,#b5bde9);
            font-family: sans-serif;
        }

        .card{
            background:white;
            padding:50px;
            border-radius:25px;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            font-size:50px;
        }

        p{
            font-size:30px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>☁️ 실시간 날씨</h1>

    <p>🌡️ 기온: {{ temp }} °C</p>

    <p>💧 습도: {{ humidity }} %</p>

    <br>

    <p>😊 좋은 하루 보내세요!</p>
</div>

</body>
</html>
